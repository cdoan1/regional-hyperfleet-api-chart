apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ index .Values "hyperfleet-api" "applicationName" }}
  namespace: {{ index .Values "hyperfleet-api" "namespace" }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ index .Values "hyperfleet-api" "project" }}

  source:
    repoURL: {{ index .Values "hyperfleet-api" "source" "repoURL" }}
    targetRevision: {{ index .Values "hyperfleet-api" "source" "targetRevision" }}
    path: {{ index .Values "hyperfleet-api" "source" "path" }}
    helm:
      {{- if index .Values "hyperfleet-api" "helmValues" }}
      values: |
        {{- toYaml (index .Values "hyperfleet-api" "helmValues") | nindent 8 }}
      {{- end }}

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ index .Values "hyperfleet-api" "targetNamespace" }}

  syncPolicy:
    {{- if index .Values "hyperfleet-api" "syncPolicy" "automated" }}
    automated:
      prune: {{ index .Values "hyperfleet-api" "syncPolicy" "automated" "prune" }}
      selfHeal: {{ index .Values "hyperfleet-api" "syncPolicy" "automated" "selfHeal" }}
    {{- end }}
    {{- if index .Values "hyperfleet-api" "syncPolicy" "syncOptions" }}
    syncOptions:
      {{- toYaml (index .Values "hyperfleet-api" "syncPolicy" "syncOptions") | nindent 6 }}
    {{- end }}
