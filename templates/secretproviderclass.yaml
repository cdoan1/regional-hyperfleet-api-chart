{{- if .Values.secretProviderClass.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.secretProviderClass.name }}
  namespace: {{ index .Values "hyperfleet-api-chart" "targetNamespace" }}
spec:
  provider: aws
  parameters:
    region: {{ .Values.secretProviderClass.region }}
    objects: |
      {{- range .Values.secretProviderClass.objects }}
      - objectName: "{{ .objectName }}"
        objectType: "{{ .objectType }}"
        {{- if .jmesPath }}
        jmesPath:
          {{- range .jmesPath }}
          - path: "{{ .path }}"
            objectAlias: "{{ .objectAlias }}"
          {{- end }}
        {{- end }}
      {{- end }}
  {{- if .Values.secretProviderClass.secretObjects }}
  secretObjects:
    {{- range .Values.secretProviderClass.secretObjects }}
    - secretName: {{ .secretName }}
      type: {{ .type }}
      data:
        {{- range .data }}
        - objectName: {{ .objectName }}
          key: {{ .key }}
        {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
